services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: songsim
      POSTGRES_USER: songsim
      POSTGRES_PASSWORD: songsim
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U songsim -d songsim"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - songsim-postgres-data:/var/lib/postgresql/data

volumes:
  songsim-postgres-data:
